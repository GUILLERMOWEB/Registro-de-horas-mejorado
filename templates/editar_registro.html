<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card p-4 shadow-lg rounded-4 mx-auto" style="max-width: 600px;">
            <h2 class="mb-4 text-center">Editar Registro</h2>

            <form method="POST">
                <div class="mb-3">
                    <label for="fecha" class="form-label">Fecha</label>
                    <input type="date" class="form-control" id="fecha" name="fecha" value="{{ registro.fecha }}" required>
                </div>

                <div class="mb-3">
                    <label for="horas" class="form-label">Horas trabajadas</label>
                    <input type="number" step="0.01" class="form-control" id="horas" name="horas" value="{{ registro.horas }}" required>
                </div>

                <div class="mb-3">
                    <label for="tarea" class="form-label">Tarea realizada</label>
                    <textarea class="form-control" id="tarea" name="tarea" rows="2" required>{{ registro.tarea }}</textarea>
                </div>

                <div class="mb-3">
                    <label for="cliente" class="form-label">Cliente</label>
                    <input type="text" class="form-control" id="cliente" name="cliente" value="{{ registro.cliente }}">
                </div>

                <div class="mb-3">
                    <label for="almuerzo" class="form-label">Tiempo de almuerzo (en horas)</label>
                    <input type="number" step="0.01" class="form-control" id="almuerzo" name="almuerzo" value="{{ registro.almuerzo }}">
                </div>

                <div class="mb-3">
                    <label for="comentario" class="form-label">Comentario adicional</label>
                    <textarea class="form-control" id="comentario" name="comentario" rows="2">{{ registro.comentario }}</textarea>
                </div>

                <button type="submit" class="btn btn-primary w-100">Guardar cambios</button>
                <a href="{{ url_for('dashboard') }}" class="btn btn-secondary w-100 mt-2">Cancelar</a>
            </form>
        </div>
    </div>
</body>
</html>
